<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VYDO — Coming Soon</title>
  <link rel="icon" href="icon.png" type="image/png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    ::selection { background: #1A56DB; color: #fff; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #fff;
      border: 2px solid #e0e8ff;
      border-radius: 12px;
      color: #1A56DB;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .back-btn:hover {
      background: #f0f4ff;
      border-color: #1A56DB;
    }

    .back-btn:active { transform: scale(0.97); }

    .coming-container {
      text-align: center;
      padding: 40px;
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .coming-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      animation: floatIcon 3s ease-in-out infinite;
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .coming-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      color: #1A56DB;
      margin-bottom: 8px;
    }

    .feature-name {
      font-size: 42px;
      font-weight: 900;
      color: #1A237E;
      margin-bottom: 16px;
      animation: fadeUp 0.8s ease 0.2s both;
    }

    .coming-tag {
      display: inline-block;
      background: #eef4ff;
      color: #1A56DB;
      font-size: 14px;
      font-weight: 700;
      padding: 8px 24px;
      border-radius: 50px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(26, 86, 219, 0.2); }
      50% { box-shadow: 0 0 0 12px rgba(26, 86, 219, 0); }
    }

    .coming-desc {
      font-size: 16px;
      color: #777;
      max-width: 400px;
      margin: 0 auto 32px;
      line-height: 1.7;
      animation: fadeUp 0.8s ease 0.4s both;
    }

    .notify-mini {
      display: flex;
      gap: 8px;
      max-width: 380px;
      margin: 0 auto;
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .notify-mini input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e8ff;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    .notify-mini input:focus {
      border-color: #1A56DB;
    }

    .notify-mini button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #1A56DB, #1246C0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .notify-mini button:hover {
      box-shadow: 0 6px 20px rgba(26, 86, 219, 0.3);
    }

    .notify-mini button:active { transform: scale(0.97); }

    .notify-done {
      display: none;
      color: #059669;
      font-weight: 700;
      font-size: 14px;
      margin-top: 12px;
    }

    /* Background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.06;
      z-index: 0;
    }

    .blob1 { width: 400px; height: 400px; background: #1A56DB; top: -100px; right: -100px; }
    .blob2 { width: 300px; height: 300px; background: #06B6D4; bottom: -80px; left: -80px; }

    @media (max-width: 768px) {
      .feature-name { font-size: 30px; }
      h1 { font-size: 22px; }
      .notify-mini { flex-direction: column; }
      .coming-container { padding: 24px 16px; }
      .coming-desc { font-size: 14px; }
      .back-btn { top: 16px; left: 16px; padding: 8px 14px; font-size: 13px; }
      .coming-icon { width: 60px; height: 60px; }
    }

    @media (max-width: 480px) {
      .feature-name { font-size: 24px; }
      h1 { font-size: 18px; }
      .coming-desc { font-size: 13px; max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <a href="home.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Home
  </a>

  <div class="coming-container">
    <div class="coming-icon">
      <img src="icon.png" alt="VYDO" />
    </div>
    <h1 id="comingTitle">Coming Soon</h1>
    <div class="feature-name" id="featureName">Feature</div>
    <div class="coming-tag">Get Ready</div>
    <p class="coming-desc" id="comingDesc">We're working hard to bring this to you. Enter your email to get notified when it's ready.</p>

    <form class="notify-mini" id="notifyForm" onsubmit="submitNotify(event)">
      <input type="email" placeholder="Enter your email..." required />
      <button type="submit">Notify Me</button>
    </form>
    <p class="notify-done" id="notifyDone">You're on the list! We'll let you know.</p>
  </div>

  <script>
    // Read page type from URL
    const params = new URLSearchParams(window.location.search);
    const page = params.get('page') || 'feature';

    const pages = {
      emergency: {
        title: "We're Building Emergency Services",
        name: 'Launching Soon!',
        desc: "24/7 emergency doctor connect is on its way. Mild, moderate and critical support in minutes. Stay tuned."
      },
      health: {
        title: "We're Posting Health Tips Soon",
        name: 'Stay Tuned!',
        desc: "Expert health tips from verified doctors — skincare, heart health, mental wellness and more. Coming your way very soon."
      },
      doctors: {
        title: "For Doctors, By VYDO",
        name: 'Launching Soon!',
        desc: "A powerful platform for doctors to manage appointments, view patient queues and grow their practice. We're crafting it just for you."
      },
      download: {
        title: "The App is Almost Ready",
        name: 'Dropping Soon!',
        desc: "Your go-to healthcare app for Android and iOS is in the final stages. Be the first to get it on your phone."
      },
      feature: {
        title: "We're Building Something Big",
        name: 'Stay Tuned!',
        desc: "Something exciting is coming that will change how India sees a doctor. Stay tuned."
      }
    };

    // Handle city page
    if (page === 'city') {
      const city = params.get('city') || 'Your City';
      pages.city = {
        title: `Hey ${city}!`,
        name: 'We\'re Coming Soon!',
        desc: `VYDO is launching in ${city} very soon. Be the first to book doctors, get emergency care, and access health tips in ${city}.`
      };
    }

    const data = pages[page] || pages.feature;
    document.getElementById('comingTitle').textContent = data.title;
    document.getElementById('featureName').textContent = data.name;
    document.getElementById('comingDesc').textContent = data.desc;
    document.title = 'VYDO — ' + data.name + ' Coming Soon';

    async function submitNotify(e) {
      e.preventDefault();
      const email = e.target.querySelector('input').value;
      try {
        await fetch('https://formspree.io/f/mzdkvjre', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, page: page, source: 'vydo-coming-soon' })
        });
      } catch(err) {}
      document.getElementById('notifyForm').style.display = 'none';
      document.getElementById('notifyDone').style.display = 'block';
    }
  </script>
</body>
</html>
